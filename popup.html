<html>
  <link rel="stylesheet" href="style.css" />
<body>
    <div id="notification"></div>
    
    <div class="header">
      <div class="logo">
        <img src="images/Icon.png" height="24" alt="" />
        <h2>Infinity V Cam</h2>
      </div>
      <div class="cameraselection">
        <select class="cselement">
          <option value="Camera1">Default Camera</option>
          <option value="Camera1">Camera 1</option>
        </select>
      </div>
      <div class="actions">
        <div class="sharebtn">
          <a id="share"><img src="images/share.png" alt="" height="14" /></a>
          <a id="popout"><img src="images/popout.png" alt="" height="14" /></a>
        </div>
      </div>
    </div>

    <div class="maincont">
      <div class="camcont">
        <canvas id="maincanwas"></canvas>
      </div>
      <button>Setup Camera</button>
    </div>

    <div class="navoptions">
      <div class="radioitem selectedradio">
        <img src="images/canvas.png" alt="Canvas" height="30" />
      </div>
      <div class="radioitem">
        <img src="images/text.png" alt="Text" height="30" />
      </div>
      <div class="radioitem">
        <img src="images/image.png" alt="Image" height="30" />
      </div>
    </div>

    <video style="display: none" id="maincam"></video>

    <div class="featurecont">
      <div style="display:flex; justify-content:space-between">
          <span>Zoom Scale</span>
          <span id="rangetext">1.2x</span>
      </div>
      <input id="scalerange" type="range" min="0.2" max="3" value="1.2" step="0.05" />

      <div style="display:flex; justify-content:space-between">
          <span>Horizontal Pan</span>
          <span id="leftrighttext">0</span>
      </div>
      <input id="leftrightrange" type="range" min="-2000" max="2000" value="0" step="10" />

      <div style="display:flex; justify-content:space-between">
          <span>Vertical Pan</span>
          <span id="updowntext">0</span>
      </div>
      <input id="updownrange" type="range" min="-2000" max="2000" value="0" step="10" />

      <div style="display: flex; gap: 20px; margin-top: 10px;">
          <label style="display:flex; align-items:center; cursor:pointer">
              <span>Flip Vertical</span>
              <input id="flipvertical" type="checkbox" />
          </label>
          <label style="display:flex; align-items:center; cursor:pointer">
              <span>Flip Horizontal</span>
              <input id="fliphorizontal" type="checkbox" />
          </label>
      </div>
    </div>

    <div class="branding">
      Made with <img src="images/heart.png" alt="" height="12" /> by Infinity8Build
    </div>
</body>
  <script src="virtualcam.js"></script>
  <script src="script.js"></script>
</html>
