<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="files/style.css" />
</head>
<body>
    <div id="notification"></div>
    
    <div class="header">
      <div class="logo">
        <img src="files/images/Icon.png" height="24" alt="" />
        <h2>Infinity V Cam</h2>
      </div>
      <div class="cameraselection">
        <select class="cselement">
          <option value="">Loading...</option>
        </select>
      </div>
      <div class="actions">
        <div class="sharebtn">
          <a id="share" title="Copy Link"><img src="files/images/share.png" alt="" height="14" /></a>
          <a id="popout" title="Popout"><img src="files/images/popout.png" alt="" height="14" /></a>
        </div>
      </div>
    </div>

    <div class="maincont">
      <div class="camcont">
        <canvas id="maincanwas"></canvas>
      </div>
    </div>

    <div class="navoptions">
      <div class="radioitem selectedradio" data-tab="canvas">
        <img src="files/images/canvas.png" alt="Canvas" height="30" />
      </div>
      <div class="radioitem" data-tab="text">
        <img src="files/images/text.png" alt="Text" height="30" />
      </div>
      <div class="radioitem" data-tab="image">
        <img src="files/images/image.png" alt="Image" height="30" />
      </div>
    </div>

    <video style="display: none" id="maincam"></video>

    <!-- Canvas Settings Tab -->
    <div id="tab-canvas" class="featurecont tab-content">
      <div class="feature-row">
          <span>Zoom Scale</span>
          <span id="rangetext">1.2x</span>
      </div>
      <input id="scalerange" type="range" min="0.2" max="3" value="1.2" step="0.05" />

      <div class="feature-row">
          <span>Horizontal Pan</span>
          <span id="leftrighttext">0</span>
      </div>
      <input id="leftrightrange" type="range" min="-1000" max="1000" value="0" step="10" />

      <div class="feature-row">
          <span>Vertical Pan</span>
          <span id="updowntext">0</span>
      </div>
      <input id="updownrange" type="range" min="-1000" max="1000" value="0" step="10" />

      <div class="checkbox-group" style="display: flex; gap: 15px; margin-top: 10px; flex-wrap: wrap;">
          <label>
              <span>Flip V</span>
              <input id="flipvertical" type="checkbox" />
          </label>
          <label>
              <span>Flip H</span>
              <input id="fliphorizontal" type="checkbox" />
          </label>
      </div>
      
     
    </div>

    <!-- Text Overlays Tab -->
    <div id="tab-text" class="featurecont tab-content" style="display: none;">
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="newTextContent" placeholder="Enter text..." style="flex-grow: 1; padding: 5px; border-radius: 4px; border: 1px solid #ddd;">
            <button id="addTextBtn" style="padding: 5px 10px; background: #6c5ce7; color: white; border: none; border-radius: 4px; cursor: pointer;">Add</button>
        </div>
        <div id="textList" class="overlay-list"></div>
    </div>

    <!-- Image Overlays Tab -->
    <div id="tab-image" class="featurecont tab-content" style="display: none;">
        <div style="margin-bottom: 10px;">
            <label class="file-upload-btn">
                <span>Upload Image</span>
                <input type="file" id="newImageFile" accept="image/*">
            </label>
        </div>
        <div id="imageList" class="overlay-list"></div>
    </div>
</body>
<script src="files/virtualcam.js"></script>
<script src="files/script.js"></script>
</html>
